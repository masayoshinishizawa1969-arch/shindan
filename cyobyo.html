<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>長秒一枚撮り星景写真用 絞り値計算ツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --muted: #9da7b3;
      --accent: #58a6ff;
      --accent2: #238636;
      --border: #30363d;
      --input: #0f141a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1117 100%);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px 14px 10px;
      text-align: center;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #title {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .lang-toggle {
      margin-top: 12px;
      border: 1px solid #4b5563;
      background: #111827;
      color: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: linear-gradient(180deg, #161b22 0%, #11161d 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .section-title {
      font-size: 1.03rem;
      font-weight: 700;
      margin: 0 0 12px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }

    input, select, button {
      font: inherit;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input);
      color: var(--text);
    }

    .stepper {
      display: flex;
      gap: 8px;
    }

    .stepper input {
      flex: 1;
    }

    .stepper button {
      min-width: 84px;
      min-height: 46px;
      border: none;
      border-radius: 10px;
      background: #243041;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .actions button {
      flex: 1;
      min-height: 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
    }

    #calcBtn {
      background: var(--accent);
      color: #06121f;
    }

    #copyBtn {
      background: #30363d;
      color: #fff;
    }

    .readonly {
      background: #0f141a;
      color: #d2e7ff;
      font-weight: 800;
      text-align: center;
      font-size: 1.05rem;
    }

    .computed {
      background: #132a1c !important;
      color: #98f5b1 !important;
      border: 1px solid #2ea043 !important;
      box-shadow: 0 0 0 1px rgba(46,160,67,0.15) inset;
    }

    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">長秒一枚撮り星景写真用<BR>絞り値計算ツール</h1>
    <button class="lang-toggle" id="langBtn">English</button>
  </header>

  <main class="container">
    <section class="card">
      <div class="section-title" id="trialTitle">1) 試し撮りの数値を入力</div>

      <div class="row">
        <label for="t1" id="t1Label">試し撮り露光 (秒)</label>
        <input type="number" id="t1" value="15" step="1" min="1" />
      </div>

      <div class="row">
        <label for="f1" id="f1Label">試し撮り絞り</label>
        <div class="stepper">
          <input type="number" id="f1" value="2.8" step="0.1" min="0.1" />
          <button type="button" id="f1Minus">-1段</button>
          <button type="button" id="f1Plus">+1段</button>
        </div>
      </div>

      <div class="row">
        <label for="iso1" id="iso1Label">試し撮り ISO</label>
        <input type="number" id="iso1" value="3200" step="100" min="1" />
      </div>
    </section>

    <section class="card">
      <div class="section-title" id="longTitle">2) 長秒設定と結果</div>

      <div class="row">
        <label for="iso2" id="iso2Label">長秒 ISO</label>
        <select id="iso2">
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>

      <div class="row">
        <label for="t2min" id="t2minLabel">長秒露光時間(分)</label>
        <input type="number" id="t2min" value="30" step="1" min="1" />
      </div>

      <div class="row">
        <label for="f2" id="f2Label">長秒絞り(自動算出)</label>
        <input type="text" id="f2" class="readonly" value="—" readonly />
      </div>

      <div class="actions">
        <button id="calcBtn">計算する</button>
        <button id="copyBtn">結果をコピー</button>
      </div>

      <div class="note" id="formulaNote">
        ※ 露出等価: 露光時間 × ISO ÷ 絞り値² を基準に計算
      </div>
    </section>
  </main>

  <script>
    const SQRT2 = Math.SQRT2;

    const els = {
      title: document.getElementById('title'),
      langBtn: document.getElementById('langBtn'),

      trialTitle: document.getElementById('trialTitle'),
      t1Label: document.getElementById('t1Label'),
      f1Label: document.getElementById('f1Label'),
      f1Minus: document.getElementById('f1Minus'),
      f1Plus: document.getElementById('f1Plus'),
      iso1Label: document.getElementById('iso1Label'),

      longTitle: document.getElementById('longTitle'),
      iso2Label: document.getElementById('iso2Label'),
      t2minLabel: document.getElementById('t2minLabel'),
      f2Label: document.getElementById('f2Label'),
      calcBtn: document.getElementById('calcBtn'),
      copyBtn: document.getElementById('copyBtn'),
      formulaNote: document.getElementById('formulaNote'),

      t1: document.getElementById('t1'),
      f1: document.getElementById('f1'),
      iso1: document.getElementById('iso1'),
      iso2: document.getElementById('iso2'),
      t2min: document.getElementById('t2min'),
      f2: document.getElementById('f2'),
    };

    let lang = 'ja';

    const texts = {
      ja: {
        title: '長秒一枚撮り星景写真用<BR>絞り値計算ツール',
        langBtn: 'English',
        trialTitle: '1) 試し撮りの数値を入力',
        t1Label: '試し撮り露光 (秒)',
        f1Label: '試し撮り絞り',
        f1Minus: '-1段',
        f1Plus: '+1段',
        iso1Label: '試し撮り ISO',
        longTitle: '2) 長秒設定と結果',
        iso2Label: '長秒 ISO',
        t2minLabel: '長秒露光時間(分)',
        f2Label: '長秒絞り(自動算出)',
        calcBtn: '計算する',
        copyBtn: '結果をコピー',
        formulaNote: '※ 露出等価: 露光時間 × ISO ÷ 絞り値² を基準に計算',
        invalid: '入力値を確認してください。',
        copied: '結果をコピーしました。',
        copyFailed: 'コピーに失敗しました。'
      },
      en: {
        title: 'Long-Exposure Single-Shot Star Photography<BR>Aperture Calculator',
        langBtn: '日本語',
        trialTitle: '1) Enter trial values',
        t1Label: 'Trial exposure (sec)',
        f1Label: 'Trial aperture',
        f1Minus: '-1 stop',
        f1Plus: '+1 stop',
        iso1Label: 'Trial ISO',
        longTitle: '2) Long-exposure settings and result',
        iso2Label: 'Long exposure ISO',
        t2minLabel: 'Long exposure time (min)',
        f2Label: 'Long exposure aperture (auto)',
        calcBtn: 'Calculate',
        copyBtn: 'Copy result',
        formulaNote: '※ Based on exposure equivalence: exposure time × ISO ÷ aperture²',
        invalid: 'Please check the input values.',
        copied: 'Copied.',
        copyFailed: 'Copy failed.'
      }
    };

    function renderLang() {
      const t = texts[lang];
      els.title.innerHTML = t.title;
      els.langBtn.textContent = t.langBtn;
      els.trialTitle.textContent = t.trialTitle;
      els.t1Label.textContent = t.t1Label;
      els.f1Label.textContent = t.f1Label;
      els.f1Minus.textContent = t.f1Minus;
      els.f1Plus.textContent = t.f1Plus;
      els.iso1Label.textContent = t.iso1Label;
      els.longTitle.textContent = t.longTitle;
      els.iso2Label.textContent = t.iso2Label;
      els.t2minLabel.textContent = t.t2minLabel;
      els.f2Label.textContent = t.f2Label;
      els.calcBtn.textContent = t.calcBtn;
      els.copyBtn.textContent = t.copyBtn;
      els.formulaNote.textContent = t.formulaNote;
      document.title = lang === 'ja'
        ? '長秒一枚撮り星景写真用 絞り値計算ツール'
        : 'Long-Exposure Single-Shot Star Photography Aperture Calculator';
    }

    function adjustAperture(delta) {
      let v = parseFloat(els.f1.value);
      if (!isFinite(v) || v <= 0) v = 2.8;
      v = delta > 0 ? v * SQRT2 : v / SQRT2;
      els.f1.value = v.toFixed(1);
      calculate();
    }

    function calculate() {
      const t1 = parseFloat(els.t1.value);        // sec
      const f1 = parseFloat(els.f1.value);
      const ISO1 = parseFloat(els.iso1.value);
      const ISO2 = parseFloat(els.iso2.value);
      const t2min = parseFloat(els.t2min.value); // min

      if (
        !isFinite(t1) || t1 <= 0 ||
        !isFinite(f1) || f1 <= 0 ||
        !isFinite(ISO1) || ISO1 <= 0 ||
        !isFinite(ISO2) || ISO2 <= 0 ||
        !isFinite(t2min) || t2min <= 0
      ) {
        els.f2.value = '—';
        els.f2.classList.remove('computed');
        return;
      }

      const t2sec = t2min * 60;

      // Excelの露出等価に合わせた式
      const f2 = f1 * Math.sqrt((t2sec * ISO2) / (t1 * ISO1));

      if (isFinite(f2) && f2 > 0) {
        els.f2.value = f2.toFixed(1);
        els.f2.classList.add('computed');
      } else {
        els.f2.value = '—';
        els.f2.classList.remove('computed');
      }
    }

    els.f1Minus.addEventListener('click', () => adjustAperture(-1));
    els.f1Plus.addEventListener('click', () => adjustAperture(1));
    els.calcBtn.addEventListener('click', calculate);

    [els.t1, els.f1, els.iso1, els.iso2, els.t2min].forEach(el => {
      el.addEventListener('input', calculate);
      el.addEventListener('change', calculate);
    });

    els.copyBtn.addEventListener('click', async () => {
      const t = texts[lang];
      const data = {
        trialExposureSec: els.t1.value,
        trialAperture: els.f1.value,
        trialISO: els.iso1.value,
        longExposureISO: els.iso2.value,
        longExposureMin: els.t2min.value,
        calculatedAperture: els.f2.value
      };

      try {
        await navigator.clipboard.writeText(JSON.stringify(data, null, 2));
        alert(t.copied);
      } catch {
        alert(t.copyFailed);
      }
    });

    els.langBtn.addEventListener('click', () => {
      lang = lang === 'ja' ? 'en' : 'ja';
      renderLang();
    });

    renderLang();
    calculate();
  </script>
</body>
</html>
