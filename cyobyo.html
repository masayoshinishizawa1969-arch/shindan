<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>長秒一枚撮り星景写真用 絞り値計算ツール</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d7dce5;
      --accent: #2563eb;
      --btn: #ffffff;
      --btnText: #1f2937;
      --resultBg: #f8fbff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);

      --night-bg: #060606;
      --night-panel: #111111;
      --night-text: #ff5a5a;
      --night-muted: #ff8a8a;
      --night-border: #7a1f1f;
      --night-btn: #1a1a1a;
      --night-btn-text: #ff6666;
      --night-result-bg: #160b0b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 16px 14px 28px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.25rem, 2vw, 1.8rem);
      line-height: 1.3;
      text-align: center;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
      transition: border-color 0.25s ease;
    }

    .section:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.02rem;
      font-weight: 700;
    }

    .field {
      margin-bottom: 13px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
      color: var(--text);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, background 0.25s ease, color 0.25s ease;
    }

    input[type="number"]:focus,
    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    button {
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--btn);
      color: var(--btnText);
      cursor: pointer;
      transition: transform 0.05s ease, background 0.2s ease, color 0.25s ease, border-color 0.25s ease;
    }

    button:hover {
      border-color: var(--accent);
    }

    button:active {
      transform: translateY(1px);
    }

    .stop-btn {
      min-width: 72px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .result {
      background: var(--resultBg);
      font-weight: 700;
    }

    .computed {
      border-color: var(--accent);
    }

    .note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* カスタム △▽ ステッパー */
    .num-wrap {
      display: flex;
      align-items: stretch;
      gap: 6px;
    }

    .num-wrap input {
      flex: 1;
      min-width: 0;
    }

    .spinner {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 44px;
      flex: 0 0 44px;
    }

.spin-btn {
  min-height: 42px;
  height: 42px;
  padding: 0;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

    /* number の標準スピンを隠す（見た目を統一） */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    body.night {
      background: var(--night-bg);
      color: var(--night-text);
    }

    body.night .panel {
      background: var(--night-panel);
      border-color: var(--night-border);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
    }

    body.night .section {
      border-color: var(--night-border);
    }

    body.night label,
    body.night h1,
    body.night h2,
    body.night .note {
      color: var(--night-text);
    }

    body.night input[type="number"],
    body.night input[type="text"],
    body.night select {
      background: #0d0d0d;
      color: var(--night-text);
      border-color: var(--night-border);
    }

    body.night input[type="number"]:focus,
    body.night input[type="text"]:focus,
    body.night select:focus {
      border-color: #ff4d4d;
    }

    body.night button {
      background: var(--night-btn);
      color: var(--night-btn-text);
      border-color: var(--night-border);
    }

    body.night button:hover {
      border-color: #ff4d4d;
    }

    body.night .result {
      background: var(--night-result-bg);
      color: #ff6b6b;
      font-weight: 800;
    }

.row.aperture-row {
  display: flex;
  flex-wrap: nowrap;
  align-items: center;
  gap: 8px;
}

.row.aperture-row input {
  flex: 1 1 auto;
  min-width: 0;
}

@media (max-width: 560px) {
  .row.aperture-row {
    flex-wrap: nowrap;
  }

  .row.aperture-row input {
    flex: 1 1 auto;
    min-width: 0;
  }

  .stop-btn {
    flex: 0 0 auto;
    min-width: 64px;
    padding: 10px 8px;
    white-space: nowrap;
  }

  /* 数値入力欄＋左右ボタンを1列固定 */
  .num-wrap {
    display: grid !important;
    grid-template-columns: 44px minmax(0, 1fr) 44px;
    grid-template-rows: 42px;
    gap: 6px;
    align-items: stretch;
    width: 100%;
  }

  .num-wrap > input {
    grid-column: 2;
    grid-row: 1;
    min-width: 0;
    width: 100%;
  }

  .num-wrap .spinner {
    display: contents !important;
  }

  .num-wrap .spin-btn {
    min-height: 42px;
    height: 42px;
    padding: 0;
    border-radius: 12px;
    font-size: 14px;
    width: 44px;
  }

  .num-wrap .spin-btn[data-dir="down"] {
    grid-column: 1;
    grid-row: 1;
  }

  .num-wrap .spin-btn[data-dir="up"] {
    grid-column: 3;
    grid-row: 1;
  }
}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button id="langBtn" type="button">English</button>
      <button id="nightBtn" type="button">Day</button>
    </div>

    <div class="panel">
      <h1 id="title">長秒一枚撮り星景写真用<br>絞り値計算ツール</h1>

      <div class="section">
        <h2 id="trialTitle">1) 試し撮りの数値を入力</h2>

        <div class="field">
          <label id="t1Label" for="t1">試し撮り露光 (秒)</label>
          <div class="num-wrap">
            <input id="t1" type="number" step="1" min="0" value="20" />
            <div class="spinner">
              <button type="button" class="spin-btn" data-target="t1" data-dir="up">△</button>
              <button type="button" class="spin-btn" data-target="t1" data-dir="down">▽</button>
            </div>
          </div>
        </div>

<div class="field">
  <label id="f1Label" for="f1">試し撮り絞り</label>
  <div class="row aperture-row">
    <button id="f1Minus" type="button" class="stop-btn">-1段</button>
    <input id="f1" type="number" step="0.1" min="0" value="4.0" />
    <button id="f1Plus" type="button" class="stop-btn">+1段</button>
  </div>
</div>

        <div class="field">
          <label id="iso1Label" for="iso1">試し撮り ISO</label>
          <select id="iso1">
            <option value="800">800</option>
            <option value="1600">1600</option>
            <option value="3200" selected>3200</option>
            <option value="6400">6400</option>
            <option value="12800">12800</option>
            <option value="25600">25600</option>
          </select>
        </div>
      </div>

      <div class="section">
        <h2 id="longTitle">2) 長秒設定と結果</h2>

        <div class="field">
          <label id="iso2Label" for="iso2">長秒 ISO</label>
          <div class="num-wrap">
            <input id="iso2" type="number" step="10" min="10" value="100" />
            <div class="spinner">
              <button type="button" class="spin-btn" data-target="iso2" data-dir="up">△</button>
              <button type="button" class="spin-btn" data-target="iso2" data-dir="down">▽</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label id="t2minLabel" for="t2min">長秒露光時間(分)</label>
          <div class="num-wrap">
            <input id="t2min" type="number" step="1" min="0" value="30" />
            <div class="spinner">
              <button type="button" class="spin-btn" data-target="t2min" data-dir="up">△</button>
              <button type="button" class="spin-btn" data-target="t2min" data-dir="down">▽</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label id="f2Label" for="f2">長秒絞り(自動算出)</label>
          <input id="f2" class="result" type="text" readonly />
        </div>

        <div class="actions">
          <button id="copyBtn" type="button">結果をコピー</button>
        </div>

        <div id="formulaNote" class="note">
          ※ 露出等価: 露光時間 × ISO ÷ 絞り値² を基準に計算
        </div>
      </div>
    </div>
  </div>

  <script>
    const SQRT2 = Math.SQRT2;

    const els = {
      title: document.getElementById('title'),
      langBtn: document.getElementById('langBtn'),
      nightBtn: document.getElementById('nightBtn'),

      trialTitle: document.getElementById('trialTitle'),
      t1Label: document.getElementById('t1Label'),
      f1Label: document.getElementById('f1Label'),
      f1Minus: document.getElementById('f1Minus'),
      f1Plus: document.getElementById('f1Plus'),
      iso1Label: document.getElementById('iso1Label'),

      longTitle: document.getElementById('longTitle'),
      iso2Label: document.getElementById('iso2Label'),
      t2minLabel: document.getElementById('t2minLabel'),
      f2Label: document.getElementById('f2Label'),
      copyBtn: document.getElementById('copyBtn'),
      formulaNote: document.getElementById('formulaNote'),

      t1: document.getElementById('t1'),
      f1: document.getElementById('f1'),
      iso1: document.getElementById('iso1'),
      iso2: document.getElementById('iso2'),
      t2min: document.getElementById('t2min'),
      f2: document.getElementById('f2'),
    };

    let lang = 'ja';
    let night = localStorage.getItem('cyobyoNight') !== '0';

    const texts = {
      ja: {
        title: '長秒一枚撮り星景写真用<BR>絞り値計算ツール',
        langBtn: 'English',
        nightBtn: 'Night',
        dayBtn: 'Day',
        trialTitle: '1) 試し撮りの数値を入力',
        t1Label: '試し撮り露光 (秒)',
        f1Label: '試し撮り絞り',
        f1Minus: '-1段',
        f1Plus: '+1段',
        iso1Label: '試し撮り ISO',
        longTitle: '2) 長秒設定と結果',
        iso2Label: '長秒 ISO',
        t2minLabel: '長秒露光時間(分)',
        f2Label: '長秒絞り(自動算出)',
        copyBtn: '結果をコピー',
        formulaNote: '※ 露出等価: 露光時間 × ISO ÷ 絞り値² を基準に計算',
        copied: '結果をコピーしました。',
        copyFailed: 'コピーに失敗しました。'
      },
      en: {
        title: 'Long-Exposure Single-Shot Star Photography<BR>Aperture Calculator',
        langBtn: '日本語',
        nightBtn: 'Night',
        dayBtn: 'Day',
        trialTitle: '1) Enter trial values',
        t1Label: 'Trial exposure (sec)',
        f1Label: 'Trial aperture',
        f1Minus: '-1 stop',
        f1Plus: '+1 stop',
        iso1Label: 'Trial ISO',
        longTitle: '2) Long-exposure settings and result',
        iso2Label: 'Long exposure ISO',
        t2minLabel: 'Long exposure time (min)',
        f2Label: 'Long exposure aperture (auto)',
        copyBtn: 'Copy result',
        formulaNote: '※ Based on exposure equivalence: exposure time × ISO ÷ aperture²',
        copied: 'Copied.',
        copyFailed: 'Copy failed.'
      }
    };

    function renderLang() {
      const t = texts[lang];
      els.title.innerHTML = t.title;
      els.langBtn.textContent = t.langBtn;
      els.nightBtn.textContent = night ? t.dayBtn : t.nightBtn;
      els.trialTitle.textContent = t.trialTitle;
      els.t1Label.textContent = t.t1Label;
      els.f1Label.textContent = t.f1Label;
      els.f1Minus.textContent = t.f1Minus;
      els.f1Plus.textContent = t.f1Plus;
      els.iso1Label.textContent = t.iso1Label;
      els.longTitle.textContent = t.longTitle;
      els.iso2Label.textContent = t.iso2Label;
      els.t2minLabel.textContent = t.t2minLabel;
      els.f2Label.textContent = t.f2Label;
      els.copyBtn.textContent = t.copyBtn;
      els.formulaNote.textContent = t.formulaNote;
      document.title = lang === 'ja'
        ? '長秒一枚撮り星景写真用 絞り値計算ツール'
        : 'Long-Exposure Single-Shot Star Photography Aperture Calculator';
    }

    function applyNightMode() {
      document.body.classList.toggle('night', night);
      localStorage.setItem('cyobyoNight', night ? '1' : '0');
      renderLang();
    }

    function adjustAperture(delta) {
      let v = parseFloat(els.f1.value);
      if (!isFinite(v) || v <= 0) v = 4.0;
      v = delta > 0 ? v * SQRT2 : v / SQRT2;
      els.f1.value = v.toFixed(1);
      calculate();
    }

    function normalizeByStep(value, step) {
      const decimals = (String(step).split('.')[1] || '').length;
      return Number(value.toFixed(decimals));
    }

    function spinValue(input, dir) {
      const step = parseFloat(input.step) || 1;
      const min = parseFloat(input.min);
      let value = parseFloat(input.value);

      if (!isFinite(value)) value = 0;
      value += dir === 'up' ? step : -step;

      if (isFinite(min) && value < min) value = min;

      value = normalizeByStep(value, step);
      input.value = value;

      input.dispatchEvent(new Event('input', { bubbles: true }));
      input.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function calculate() {
      const t1 = parseFloat(els.t1.value);
      const f1 = parseFloat(els.f1.value);
      const ISO1 = parseFloat(els.iso1.value);
      const ISO2 = parseFloat(els.iso2.value);
      const t2min = parseFloat(els.t2min.value);

      if (
        !isFinite(t1) || t1 <= 0 ||
        !isFinite(f1) || f1 <= 0 ||
        !isFinite(ISO1) || ISO1 <= 0 ||
        !isFinite(ISO2) || ISO2 <= 0 ||
        !isFinite(t2min) || t2min <= 0
      ) {
        els.f2.value = '—';
        els.f2.classList.remove('computed');
        return;
      }

      const t2sec = t2min * 60;
      const f2 = f1 * Math.sqrt((t2sec * ISO2) / (t1 * ISO1));

      if (isFinite(f2) && f2 > 0) {
        els.f2.value = f2.toFixed(1);
        els.f2.classList.add('computed');
      } else {
        els.f2.value = '—';
        els.f2.classList.remove('computed');
      }
    }

    els.f1Minus.addEventListener('click', () => adjustAperture(-1));
    els.f1Plus.addEventListener('click', () => adjustAperture(1));

    [els.t1, els.f1, els.iso1, els.iso2, els.t2min].forEach(el => {
      el.addEventListener('input', calculate);
      el.addEventListener('change', calculate);
    });

let holdStartTimer = null;
let holdRepeatTimer = null;

function stopSpinHold() {
  clearTimeout(holdStartTimer);
  clearInterval(holdRepeatTimer);
  holdStartTimer = null;
  holdRepeatTimer = null;
}

function startSpinHold(btn, e) {
  e.preventDefault();

  const target = document.getElementById(btn.dataset.target);
  const dir = btn.dataset.dir;
  if (!target) return;

  // まず1回動かす
  spinValue(target, dir);

  // Pointer capture
  if (typeof btn.setPointerCapture === 'function' && e.pointerId !== undefined) {
    try {
      btn.setPointerCapture(e.pointerId);
    } catch (_) {}
  }

  // 既存タイマー停止
  stopSpinHold();

  // 少し長押ししたら連続増減開始
  holdStartTimer = setTimeout(() => {
    holdRepeatTimer = setInterval(() => {
      spinValue(target, dir);
    }, 80); // 連続増減の速さ
  }, 350); // 長押し判定までの時間
}

document.querySelectorAll('.spin-btn').forEach(btn => {
  btn.addEventListener('pointerdown', (e) => startSpinHold(btn, e));
  btn.addEventListener('pointerup', stopSpinHold);
  btn.addEventListener('pointercancel', stopSpinHold);
  btn.addEventListener('lostpointercapture', stopSpinHold);
  btn.addEventListener('pointerleave', stopSpinHold);
});

document.addEventListener('pointerup', stopSpinHold);
document.addEventListener('pointercancel', stopSpinHold);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopSpinHold();
});

    els.copyBtn.addEventListener('click', async () => {
      const t = texts[lang];
      const data = {
        trialExposureSec: els.t1.value,
        trialAperture: els.f1.value,
        trialISO: els.iso1.value,
        longExposureISO: els.iso2.value,
        longExposureMin: els.t2min.value,
        calculatedAperture: els.f2.value
      };

      try {
        await navigator.clipboard.writeText(JSON.stringify(data, null, 2));
        alert(t.copied);
      } catch {
        alert(t.copyFailed);
      }
    });

    els.langBtn.addEventListener('click', () => {
      lang = lang === 'ja' ? 'en' : 'ja';
      renderLang();
    });

    els.nightBtn.addEventListener('click', () => {
      night = !night;
      applyNightMode();
    });

    applyNightMode();
    calculate();
  </script>
</body>
</html>
