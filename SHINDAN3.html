<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天体写真愛好家タイプ診断</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 40px auto;
      padding: 20px;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.7;
    }

    h1, h2 {
      text-align: center;
    }

    .desc {
      text-align: center;
      margin-bottom: 30px;
      color: #cbd5e1;
    }

    .question {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .question h3 {
      margin-top: 0;
      color: #93c5fd;
    }

    label {
      display: block;
      margin: 10px 0;
      cursor: pointer;
      padding: 10px;
      border-radius: 8px;
      background: #334155;
    }

    label:hover {
      background: #475569;
    }

    input[type="radio"] {
      margin-right: 8px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      display: none;
      margin-top: 30px;
      background: #1e293b;
      padding: 24px;
      border-radius: 12px;
    }

    .result h2 {
      color: #facc15;
    }

    .score-box {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .score-card {
      flex: 1;
      min-width: 220px;
      background: #334155;
      padding: 16px;
      border-radius: 10px;
    }

    canvas {
      display: block;
      margin: 24px auto 0;
      background: #ffffff;
      border-radius: 12px;
      max-width: 100%;
    }

    .small {
      font-size: 14px;
      color: #cbd5e1;
    }

    .highlight {
      color: #f9a8d4;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>🌌 天体写真愛好家タイプ診断</h1>
  <p class="desc">
    いくつかの質問に答えると、あなたが散布図上のどのタイプに近いかを判定します。<br>
    <span class="small">※ 軸名・タイプ名・座標はあとで自由に変更できます。</span>
  </p>

  <form id="quizForm"></form>

  <button id="submitBtn">診断する</button>

  <div id="result" class="result">
    <h2 id="resultTitle"></h2>
    <p id="resultDescription"></p>

    <div class="score-box">
      <div class="score-card">
        <h3>📍 あなたの座標</h3>
        <p>X軸: <span id="xScore"></span></p>
        <p>Y軸: <span id="yScore"></span></p>
      </div>
      <div class="score-card">
        <h3>🧭 軸の意味</h3>
        <p><strong>X軸</strong>: 作品表現 ←→ 対象追求</p>
        <p><strong>Y軸</strong>: 気軽さ ←→ 精密さ</p>
      </div>
    </div>

    <canvas id="chart" width="700" height="500"></canvas>

    <p class="small" style="margin-top:16px;">
      ピンクの点があなた、青い点が各タイプです。
    </p>
  </div>

  <script>
    // =========================================
    // 1. 散布図のタイプ定義
    // x, y は -10 ～ +10 くらいを想定
    // ※ここを実際の散布図に合わせて変更してください
    // =========================================
    const TYPES = [
      {
        name: "星景ロマン派",
        x: -7,
        y: -6,
        description: "風景と星空の一体感を大切にするタイプ。機動力があり、感動を作品として残すのが得意です。"
      },
      {
        name: "天の川ハンター",
        x: -2,
        y: -4,
        description: "広がりのある夜空や季節の銀河を狙うタイプ。遠征や空の条件に敏感で、空の表情を読むのが得意です。"
      },
      {
        name: "ディープスカイ職人",
        x: 8,
        y: 9,
        description: "星雲・銀河を高精度に仕上げる探究派。機材・追尾・画像処理への理解が深く、完成度にこだわります。"
      },
      {
        name: "惑星ディテール派",
        x: 9,
        y: 4,
        description: "月・惑星の細部描写に情熱を注ぐタイプ。シーイングや拡大撮影に強く、シャープな描写を求めます。"
      },
      {
        name: "観望バランサー",
        x: 1,
        y: 0,
        description: "気軽さとこだわりのバランスが良い万能型。幅広い対象を楽しみながら、無理なく継続できるタイプです。"
      }
    ];

    // =========================================
    // 2. 質問定義
    // 各回答で x, y に点数加算
    // =========================================
    const QUESTIONS = [
      {
        text: "1. いちばん撮りたい対象は？",
        options: [
          { label: "A. 風景と星空が一緒に入る星景写真", x: -3, y: -2 },
          { label: "B. 天の川や広い夜空", x: -1, y: -2 },
          { label: "C. 星雲・銀河", x: 3, y: 3 },
          { label: "D. 月・惑星", x: 3, y: 1 }
        ]
      },
      {
        text: "2. 撮影でいちばん大事なのは？",
        options: [
          { label: "A. 雰囲気や美しさ", x: -3, y: -1 },
          { label: "B. 空の状態や季節感", x: -1, y: 0 },
          { label: "C. 解像感や精密さ", x: 3, y: 3 },
          { label: "D. 対象の細部描写", x: 3, y: 2 }
        ]
      },
      {
        text: "3. 機材についてどう思う？",
        options: [
          { label: "A. 軽くて手軽が一番", x: -2, y: -3 },
          { label: "B. 必要十分ならOK", x: 0, y: -1 },
          { label: "C. 目的のためなら増えるのも仕方ない", x: 2, y: 2 },
          { label: "D. 精度のためなら妥協したくない", x: 3, y: 3 }
        ]
      },
      {
        text: "4. 撮影後の作業は？",
        options: [
          { label: "A. できるだけ簡単に仕上げたい", x: -2, y: -2 },
          { label: "B. 少し調整するくらい", x: 0, y: -1 },
          { label: "C. 画像処理も撮影の一部だと思う", x: 2, y: 3 },
          { label: "D. 細部まで詰めて仕上げたい", x: 3, y: 3 }
        ]
      },
      {
        text: "5. 遠征スタイルは？",
        options: [
          { label: "A. 近場で気軽に楽しみたい", x: -2, y: -2 },
          { label: "B. 条件が良ければ遠出もする", x: -1, y: 0 },
          { label: "C. 暗い空のためなら遠征する", x: 1, y: 1 },
          { label: "D. ベスト条件を追って動く", x: 2, y: 2 }
        ]
      },
      {
        text: "6. あなたに近いのは？",
        options: [
          { label: "A. 感動を作品にしたい", x: -3, y: -1 },
          { label: "B. 星空の広がりを伝えたい", x: -2, y: -1 },
          { label: "C. 見えないものを写したい", x: 3, y: 3 },
          { label: "D. 細部を徹底的に見たい", x: 3, y: 2 }
        ]
      }
    ];

    const quizForm = document.getElementById("quizForm");

    QUESTIONS.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "question";
      div.innerHTML = `<h3>${q.text}</h3>`;
      q.options.forEach((opt, j) => {
        const id = `q${i}_o${j}`;
        const label = document.createElement("label");
        label.innerHTML = `
          <input type="radio" name="q${i}" id="${id}" value="${j}">
          ${opt.label}
        `;
        div.appendChild(label);
      });
      quizForm.appendChild(div);
    });

    document.getElementById("submitBtn").addEventListener("click", () => {
      let totalX = 0;
      let totalY = 0;

      for (let i = 0; i < QUESTIONS.length; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        if (!checked) {
          alert(`${i + 1}問目に回答してください。`);
          return;
        }
        const selected = QUESTIONS[i].options[checked.value];
        totalX += selected.x;
        totalY += selected.y;
      }

      // スコアを -10 ～ +10 に丸める感じで調整
      totalX = Math.max(-10, Math.min(10, Math.round(totalX / 2)));
      totalY = Math.max(-10, Math.min(10, Math.round(totalY / 2)));

      const nearestType = findNearestType(totalX, totalY);

      document.getElementById("resultTitle").innerHTML =
        `✨ 診断結果：<span class="highlight">${nearestType.name}</span>`;
      document.getElementById("resultDescription").textContent =
        nearestType.description;
      document.getElementById("xScore").textContent = totalX;
      document.getElementById("yScore").textContent = totalY;
      document.getElementById("result").style.display = "block";

      drawChart(totalX, totalY);
      document.getElementById("result").scrollIntoView({ behavior: "smooth" });
    });

    function findNearestType(x, y) {
      let nearest = null;
      let minDist = Infinity;

      TYPES.forEach(type => {
        const dist = Math.sqrt((x - type.x) ** 2 + (y - type.y) ** 2);
        if (dist < minDist) {
          minDist = dist;
          nearest = type;
        }
      });

      return nearest;
    }

    function drawChart(userX, userY) {
      const canvas = document.getElementById("chart");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const pad = 60;

      ctx.clearRect(0, 0, w, h);

      // 背景
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);

      // タイトル
      ctx.fillStyle = "#111827";
      ctx.font = "16px Arial";
      ctx.fillText("天体写真愛好家タイプ散布図", 20, 30);

      // 軸
      const centerX = w / 2;
      const centerY = h / 2;

      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad, centerY);
      ctx.lineTo(w - pad, centerY);
      ctx.moveTo(centerX, pad);
      ctx.lineTo(centerX, h - pad);
      ctx.stroke();

      // 軸ラベル
      ctx.fillStyle = "#334155";
      ctx.font = "14px Arial";
      ctx.fillText("作品表現 ← X → 対象追求", centerX - 90, h - 20);
      ctx.save();
      ctx.translate(20, centerY + 80);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("気軽さ ← Y → 精密さ", 0, 0);
      ctx.restore();

      // 目盛り
      for (let i = -10; i <= 10; i += 5) {
        const px = mapX(i, w, pad);
        const py = mapY(i, h, pad);

        ctx.strokeStyle = "#e2e8f0";
        ctx.beginPath();
        ctx.moveTo(px, pad);
        ctx.lineTo(px, h - pad);
        ctx.moveTo(pad, py);
        ctx.lineTo(w - pad, py);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.fillText(i, px - 5, centerY + 18);
        ctx.fillText(i, centerX + 8, py + 5);
      }

      // タイプ点
      TYPES.forEach(type => {
        const px = mapX(type.x, w, pad);
        const py = mapY(type.y, h, pad);

        ctx.fillStyle = "#2563eb";
        ctx.beginPath();
        ctx.arc(px, py, 7, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#111827";
        ctx.font = "13px Arial";
        ctx.fillText(type.name, px + 10, py - 8);
      });

      // ユーザー点
      const userPx = mapX(userX, w, pad);
      const userPy = mapY(userY, h, pad);

      ctx.fillStyle = "#ec4899";
      ctx.beginPath();
      ctx.arc(userPx, userPy, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#be185d";
      ctx.font = "bold 13px Arial";
      ctx.fillText("あなた", userPx + 10, userPy + 18);
    }

    function mapX(x, w, pad) {
      return pad + ((x + 10) / 20) * (w - pad * 2);
    }

    function mapY(y, h, pad) {
      return h - pad - ((y + 10) / 20) * (h - pad * 2);
    }
  </script>
</body>
</html>
